dog_perception:
  ros__parameters:
    digit_result_topic: "/target/digit_result"
    digit_recognizer_type: "heuristic"
    digit_roi_x: 0
    digit_roi_y: 0
    digit_roi_width: 64
    digit_roi_height: 64
    digit_min_confidence: 0.30
    digit_glare_brightness_threshold: 245.0
    digit_glare_ratio_threshold: 0.35
    digit_temporal_window: 5
    digit_temporal_confirm_count: 2
    lifecycle_mode_topic: "/lifecycle/system_mode"
    single_side_dropout_timeout_ms: 150
    extrapolation_watchdog_ms: 20
    extrapolation_max_window_ms: 300
    extrapolation_min_interval_ms: 40
    idle_spinning_publish_ms: 200
